# Qwen3-TTS — TTFA-optimized profile for ~25 concurrent streams, timestamps-compatible
#
# Same operating point as qwen3_tts_ttfa.yaml (~25 concurrent, TTFA-dominated),
# with per-stage memory footprint reduced to leave headroom for the
# Qwen3-ForcedAligner-0.6B model running in the API server process
# (used when the server is launched with --timestamps).
#
# Why a separate file:
# - Qwen3-ForcedAligner-0.6B bf16 weights are ~1.3 GiB.
# - One alignment forward pass for a ~15s utterance needs ~2–3 GiB of
#   activations.
# - Neither is counted inside `gpu_memory_utilization`, and the Stage-1
#   code2wav `max_num_batched_tokens: 65536` produces large prefill
#   activations that exceed its utilization fraction in practice.
# - On an 80 GB H100, the base ttfa config (talker 0.55 + code2wav 0.25
#   + weights + activations) leaves only ~4 GiB free, which can OOM the
#   aligner on longer utterances.
#
# Deltas vs qwen3_tts_ttfa.yaml:
#   - talker gpu_memory_utilization: 0.55 -> 0.45  (~8 GiB freed)
#   - code2wav gpu_memory_utilization: 0.25 -> 0.20 (~4 GiB freed)
#   - cudagraph_capture_sizes: 16 -> 8 buckets     (~15 GiB freed in graph pools)
#   - Total freed for aligner + overhead: ~27 GiB on an 80 GB GPU.
#     CUDA graph private pools (~1.8 GiB each) are allocated OUTSIDE
#     `gpu_memory_utilization`, so trimming is required to keep the aligner
#     fed. Uncaptured batch sizes pad up to the next captured bucket.
async_chunk: true
stage_args:
  - stage_id: 0
    stage_type: llm
    is_comprehension: true
    runtime:
      devices: "0"
    engine_args:
      model_stage: qwen3_tts
      max_num_seqs: 32
      model_arch: Qwen3TTSTalkerForConditionalGeneration
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      enforce_eager: false
      trust_remote_code: true
      async_scheduling: true
      enable_prefix_caching: false
      engine_output_type: latent
      # Lowered from 0.55 (ttfa) to free ~8 GiB on an 80 GB GPU for the
      # ForcedAligner running in the API server process.
      gpu_memory_utilization: 0.45
      max_num_batched_tokens: 16384
      max_model_len: 4096
      # Trimmed from 16 buckets (ttfa) to 8. Each captured graph owns a
      # private pool of ~1.8 GiB on the 1.7B talker, allocated OUTSIDE
      # `gpu_memory_utilization` — this is the only way to bound process
      # memory so the co-resident aligner forward pass has room.
      # 16 buckets -> ~29 GiB of graph pools; 8 buckets -> ~14 GiB.
      # Coverage focuses on the 16–32 operating range; uncaptured batch
      # sizes pad up to the next captured bucket.
      cudagraph_capture_sizes: [1, 2, 4, 8, 16, 20, 24, 28, 32]
      custom_process_next_stage_input_func: vllm_omni.model_executor.stage_input_processors.qwen3_tts.talker2code2wav_async_chunk
    output_connectors:
      to_stage_1: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.9
      top_k: 50
      max_tokens: 4096
      seed: 42
      detokenize: false
      repetition_penalty: 1.05
      stop_token_ids: [2150]

  - stage_id: 1
    stage_type: llm
    runtime:
      devices: "0"
    engine_args:
      model_stage: code2wav
      max_num_seqs: 32
      model_arch: Qwen3TTSCode2Wav
      worker_type: generation
      scheduler_cls: vllm_omni.core.sched.omni_generation_scheduler.OmniGenerationScheduler
      enforce_eager: true
      trust_remote_code: true
      async_scheduling: true
      enable_prefix_caching: false
      engine_output_type: audio
      # Lowered from 0.25 (ttfa) to free ~4 GiB. The real footprint is
      # dominated by weights + prefill activations; shrinking the fraction
      # mainly shrinks the KV pool which is rarely the bottleneck here.
      gpu_memory_utilization: 0.20
      max_num_batched_tokens: 65536
      max_model_len: 65536
    engine_input_source: [0]
    final_output: true
    final_output_type: audio
    input_connectors:
      from_stage_0: connector_of_shared_memory
    tts_args:
      max_instructions_length: 500
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 65536
      seed: 42
      detokenize: true
      repetition_penalty: 1.0

runtime:
  enabled: true
  defaults:
    window_size: -1
    max_inflight: 25

  connectors:
    connector_of_shared_memory:
      name: SharedMemoryConnector
      extra:
        shm_threshold_bytes: 65536
        codec_streaming: true
        connector_get_sleep_s: 0.01
        connector_get_max_wait_first_chunk: 2000
        connector_get_max_wait: 200
        codec_chunk_frames: 25
        codec_left_context_frames: 72
        initial_codec_chunk_frames: 2

  edges:
    - from: 0
      to: 1
      window_size: -1
